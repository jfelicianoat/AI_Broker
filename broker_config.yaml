server:
  host: 127.0.0.1
  port: 8080
  workers: 1
  cors_enabled: false
persistence:
  database: state/broker.db
  journal_mode: WAL
processing:
  max_active_workflows: 1
  max_parallel_invocations: auto
  queue_max_size: 1000
  task_timeout_seconds: 3000
  unload_after_task: true
  auto_dispatch: true
  dispatcher_interval_seconds: 0.1
  provider_mode: real
resources:
  local_vram_budget_gb: 64.0
  vram_safety_margin_gb: 2.0
  max_loaded_local_models: auto
  scheduling_policy: adaptive
  allow_execution_waves: true
health:
  sqlite_interval_seconds: 10
  local_dependencies_interval_seconds: 30
  external_providers_interval_seconds: 300
  disk_free_alert_gb: 10
logging:
  level: INFO
  directory: logs
  filename: ai-broker.log
  max_bytes: 10485760
  backup_count: 5
  console_enabled: true
providers:
  ollama:
    enabled: true
    base_url: http://127.0.0.1:11434
    timeout_seconds: 300.0
    unload_timeout_seconds: 10.0
  deepseek:
    enabled: false
    base_url: https://api.deepseek.com
    timeout_seconds: 300.0
    api_key_env: DEEPSEEK_API_KEY
    keyring_service: ai-broker
    keyring_username: deepseek_api_key
    default_model: deepseek-chat
    context_window: 64000
    input_cost_per_million: 0.0
    output_cost_per_million: 0.0
  huggingface_local:
    enabled: false
    models_dir: .local/models
    timeout_seconds: 300.0
    default_context_window: 32768
    default_device: auto
    default_dtype: null
    trust_remote_code: false
    models: []
  custom:
  - id: nvidia
    enabled: true
    adapter: openai_compatible
    display_name: NVIDIA NIM
    base_url: https://integrate.api.nvidia.com/v1
    timeout_seconds: 300.0
    api_key_env: NVIDIA_API_KEY
    keyring_service: ai-broker
    keyring_username: nvidia_api_key
    deployment: api
    sync_models: true
    default_context_window: 128000
    probe_max_output_tokens: 1
    probe_delay_seconds: 2.0
    probe_max_models: 10
    probe_skip_compatible: true
    probe_skip_checked: true
    input_cost_per_million: 0.0
    output_cost_per_million: 0.0
    models:
    - name: 01-ai/yi-large
      context_window: 128000
      input_cost_per_million: 0.0
      output_cost_per_million: 0.0
