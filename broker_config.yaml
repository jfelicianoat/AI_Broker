server:
  host: 192.168.1.52
  port: 8765
  workers: 1
  cors_enabled: false
  admin_token_env: AI_BROKER_ADMIN_TOKEN
  admin_keyring_service: ai-broker
  admin_keyring_username: dashboard_admin_token
  allow_unauthenticated_lan: false
persistence:
  database: state/broker.db
  journal_mode: WAL
  events_retention_days: 30
  artifacts_retention_days: 0
  files_retention_days: 0
processing:
  max_active_workflows: 1
  max_parallel_invocations: auto
  queue_max_size: 1000
  task_timeout_seconds: 3000
  max_task_attempts: 3
  unload_after_task: true
  auto_dispatch: true
  dispatcher_interval_seconds: 0.1
  provider_mode: real
prompt_compression:
  enabled: true
  level: aggressive
  min_chars: 40
ingestion:
  enabled: true
  storage_dir: state/files
  max_file_mb: 8192
  max_pdf_pages: 2000
  ocr_enabled: true
  ocr_languages:
  - es
  - en
  conversion_timeout_seconds: 7200
  images:
    enabled: true
    base_url: http://127.0.0.1:1234/v1
    model: google/gemma-4-31b-qat
    api_key_env: null
    timeout_seconds: 180.0
    max_images: 20
  transcription:
    enabled: true
    model_size: small
    device: auto
    language: null
    ffmpeg_path: C:\Users\pcesp\AppData\Local\Microsoft\WinGet\Packages\Gyan.FFmpeg_Microsoft.Winget.Source_8wekyb3d8bbwe\ffmpeg-8.1.2-full_build\bin\ffmpeg.exe
sandbox:
  enabled: true
  docker_path: docker
  image: ai-broker-sandbox:latest
  timeout_seconds: 60.0
  memory_mb: 1024
  cpus: 2.0
  pids_limit: 256
  max_output_chars: 8000
resources:
  local_vram_budget_gb: 64.0
  vram_safety_margin_gb: 2.0
  max_loaded_local_models: auto
  scheduling_policy: adaptive
  allow_execution_waves: true
routing:
  adaptive_selection: true
  stats_window_days: 7
  min_invocations: 3
  success_weight: 0.5
  latency_weight: 0.3
  cost_weight: 0.2
strategy_router:
  enabled: false
  heuristic_classifier: true
  confidence_escalation: false
  adaptive_learning: false
  record_cases: true
  mixture_min_prompt_chars: 600
  mixture_min_budget_usd: 0.0
  escalation_min_confidence: 0.6
  learning_min_cases: 5
  learning_escalation_threshold: 0.5
  learning_failure_threshold: 0.4
model_enrichment:
  enabled: true
  url: https://models.dev/api.json
  refresh_hours: 24.0
  timeout_seconds: 20.0
health:
  sqlite_interval_seconds: 10
  local_dependencies_interval_seconds: 30
  external_providers_interval_seconds: 300
  disk_free_alert_gb: 10
  probe_timeout_seconds: 5.0
logging:
  level: INFO
  directory: logs
  filename: ai-broker.log
  max_bytes: 10485760
  backup_count: 5
  console_enabled: true
providers:
  ollama:
    enabled: true
    base_url: http://127.0.0.1:11434
    timeout_seconds: 300.0
    unload_timeout_seconds: 10.0
    catalog_cache_seconds: 5.0
  deepseek:
    enabled: false
    base_url: https://api.deepseek.com
    timeout_seconds: 300.0
    api_key_env: DEEPSEEK_API_KEY
    keyring_service: ai-broker
    keyring_username: deepseek_api_key
    default_model: deepseek-chat
    context_window: 64000
    input_cost_per_million: 0.0
    output_cost_per_million: 0.0
